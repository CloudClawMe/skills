# CloudClaw — чистый дефолтный nginx.conf.
#
# Экстремальный recovery: используйте ТОЛЬКО если вы вопреки инструкциям
# залезли в /etc/nginx/nginx.conf и сломали его. В нормальном flow
# пользовательские конфиги живут в /etc/nginx/conf.d/*.conf, а сам nginx.conf
# принадлежит базовому образу и трогать его не нужно.
#
# Если вы сломали один из файлов в /etc/nginx/conf.d/ — не копируйте этот файл
# в nginx.conf, а просто временно уберите сломанный conf.d-файл:
#   sudo mv /etc/nginx/conf.d/<broken>.conf /tmp/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Если действительно сломан nginx.conf — скопируйте этот файл:
#   sudo cp /path/to/nginx-recovery.conf /etc/nginx/nginx.conf
#   sudo nginx -t && sudo systemctl restart nginx

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Fallback default server — отдаёт брендированную заглушку и публичный /static/.
    # Матчится на любые server_name, которые не матчатся пользовательскими server{} блоками
    # из /etc/nginx/conf.d/*.conf. Этот блок — часть базового образа и пользователем
    # не редактируется.
    server {
        listen 80 default_server;
        server_name _;

        root /var/www/html;
        index index.html;

        # Публичная static-директория для шеринга файлов.
        # /var/www/html/static/ — симлинк на /srv/state/static/ (preserved-путь
        # persistent-strategy), поэтому файлы переживают миграцию инстанса.
        # Capability доступна на любом домене, привязанном к контейнеру, независимо
        # от того, что пользователь настроил в /etc/nginx/conf.d/*.conf.
        #
        # Листинг директории по умолчанию выключен — файлы доступны только по прямой ссылке.
        location /static/ {
            autoindex off;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }

    # Пользовательские server{} блоки — по одному файлу на сайт/приложение.
    # /etc/nginx/conf.d/ — симлинк на /srv/state/nginx-conf.d/, поэтому
    # пользовательские конфиги переживают миграцию инстанса.
    include /etc/nginx/conf.d/*.conf;
}
