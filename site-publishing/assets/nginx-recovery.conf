# CloudClaw — чистый дефолтный nginx.conf.
# Если вы сломали конфиг — скопируйте этот файл в /etc/nginx/nginx.conf
# и выполните: sudo nginx -t && sudo systemctl restart nginx
#
# Это точная копия дефолтного nginx.conf, с которым user container
# выдаётся пользователю при инициализации.

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80 default_server;
        server_name _;

        root /var/www/html;
        index index.html;

        # Публичная static-директория для шеринга файлов.
        # Всё, что пользователь кладёт в /var/www/html/static/, становится доступно
        # по URL /static/<filename> на его default domain (и любом другом привязанном домене).
        # Используется file-sharing skill'ом (publish-file).
        #
        # Листинг директории по умолчанию выключен — файлы доступны только по прямой ссылке.
        # Чтобы включить публичный листинг: замените `autoindex off;` на `autoindex on;`.
        location /static/ {
            autoindex off;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
