# CloudClaw — Nginx проксирует к приложению в Docker.
#
# Используется вместе с docker-compose.example.yml:
#   внутри inner-контейнера приложение слушает 3000;
#   Docker пробрасывает его на 127.0.0.1:19001 в user-container'е;
#   Nginx проксирует весь трафик с :80 на этот порт.

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    upstream app {
        server 127.0.0.1:19001;
        keepalive 32;
    }

    server {
        listen 80;
        server_name <name>.myproj.me;

        # Публичная static-директория — сохраняем дефолтный file-sharing.
        location /static/ {
            alias /var/www/html/static/;
            autoindex off;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
            try_files $uri =404;
        }

        # WebSocket / SSE — можно безопасно оставить, клиентский код без них не пострадает
        location / {
            proxy_pass http://app;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }
    }
}
