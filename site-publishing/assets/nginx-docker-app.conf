# CloudClaw — Nginx проксирует к приложению в Docker.
#
# Разместите этот файл как /etc/nginx/conf.d/<name>.conf.
#
# Используется вместе с docker-compose.example.yml:
#   внутри inner-контейнера приложение слушает 3000;
#   Docker пробрасывает его на 127.0.0.1:19001 в user-container'е;
#   Nginx проксирует весь трафик с :80 на этот порт.
#
# Замените <name> на свой default name. docker-compose.yml и build-контекст
# кладите в /srv/state/projects/<name>/ — это preserved-путь, он переносится
# между серверами при миграции инстанса. /etc/nginx/nginx.conf не трогайте.

upstream app_<name> {
    server 127.0.0.1:19001;
    keepalive 32;
}

server {
    listen 80;
    server_name <name>.myproj.me;

    # WebSocket / SSE — можно безопасно оставить, клиентский код без них не пострадает
    location / {
        proxy_pass http://app_<name>;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
