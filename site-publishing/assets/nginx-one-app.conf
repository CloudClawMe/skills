# CloudClaw — один статический сайт на default domain.
#
# Разместите этот файл как /etc/nginx/conf.d/<name>.conf
# (где <name> — имя вашего сайта; в CloudClaw пользовательские Nginx-конфиги
# живут в /etc/nginx/conf.d/, который симлинкнут на /srv/state/nginx-conf.d/
# и переживает миграцию инстанса).
#
# Замените <name> на свой выданный default name (виден в /account или GET /api/domains).
# Положите контент в /srv/state/projects/<name>/ — это preserved-путь, он переносится
# между серверами при миграции инстанса.
#
# /etc/nginx/nginx.conf не трогайте — location /static/ и дефолтный fallback-сайт
# уже живут там.

server {
    listen 80;
    server_name <name>.myproj.me;

    root /srv/state/projects/<name>;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Кэш для статических ассетов
    location ~* \.(?:css|js|jpg|jpeg|png|gif|svg|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
    }
}
