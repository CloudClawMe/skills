# CloudClaw — один статический сайт на default domain.
# Замените <name> на свой выданный default name (виден в /account или GET /api/domains).
# Положите контент в /var/www/my-site/.

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name <name>.myproj.me;

        root /var/www/my-site;
        index index.html;

        # Публичная static-директория — не удаляйте, если хотите сохранить file-sharing capability.
        location /static/ {
            alias /var/www/html/static/;
            autoindex off;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ =404;
        }

        # Кэш для статических ассетов
        location ~* \.(?:css|js|jpg|jpeg|png|gif|svg|woff2?)$ {
            expires 30d;
            access_log off;
            add_header Cache-Control "public, max-age=2592000";
        }
    }
}
