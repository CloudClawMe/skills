# CloudClaw — несколько сайтов на разных доменах в одном контейнере.
#
# Пример:
#   <name>.myproj.me         → статический блог в /var/www/blog/
#   <name>-shop.myproj.me    → Node/Python-приложение на 127.0.0.1:19001
#   blog.example.com         → внешний custom domain (Pro+), статика /var/www/external/
#
# Замените <name> на свой default name.

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Сайт 1: статический блог на default domain
    server {
        listen 80;
        server_name <name>.myproj.me;

        root /var/www/blog;
        index index.html;

        # Публичная static-директория — сохраняем дефолтный file-sharing.
        location /static/ {
            alias /var/www/html/static/;
            autoindex off;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }

    # Сайт 2: приложение на поддомене, проксируется на локальный порт
    server {
        listen 80;
        server_name <name>-shop.myproj.me;

        location / {
            proxy_pass http://127.0.0.1:19001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # Сайт 3: внешний custom domain (требует Pro+ и добавления через POST /api/domains)
    server {
        listen 80;
        server_name blog.example.com;

        root /var/www/external;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
