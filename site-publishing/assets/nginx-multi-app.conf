# CloudClaw — несколько сайтов на разных доменах в одном контейнере.
#
# Разместите этот файл как /etc/nginx/conf.d/<project>.conf (например, /etc/nginx/conf.d/sites.conf).
# Можно также разбить на отдельные файлы: /etc/nginx/conf.d/blog.conf, /etc/nginx/conf.d/shop.conf —
# оба варианта эквивалентны.
#
# Пример:
#   <name>.myproj.me         → статический блог в /srv/state/projects/blog/
#   <name>-shop.myproj.me    → Node/Python-приложение на 127.0.0.1:19001
#   blog.example.com         → внешний custom domain (Pro+), статика в /srv/state/projects/external/
#
# Замените <name> на свой default name.
#
# Контент каждого сайта кладите в /srv/state/projects/<site>/ — это preserved-путь,
# он переносится между серверами при миграции инстанса. /etc/nginx/nginx.conf не трогайте.

# Сайт 1: статический блог на default domain
server {
    listen 80;
    server_name <name>.myproj.me;

    root /srv/state/projects/blog;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

# Сайт 2: приложение на поддомене, проксируется на локальный порт
server {
    listen 80;
    server_name <name>-shop.myproj.me;

    location / {
        proxy_pass http://127.0.0.1:19001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# Сайт 3: внешний custom domain (требует Pro+ и добавления через POST /api/domains)
server {
    listen 80;
    server_name blog.example.com;

    root /srv/state/projects/external;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
